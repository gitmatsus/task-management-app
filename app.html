// ── Import / Export ────────────────────────────────────
function closeModal() {
  modalMode = null; modalLists = []; modalAllChecked = false; importPayload = null;
  render();
}
function renderModal() {
  const checkSvg = I.check;
  const allCb = document.querySelector('.select-all .modal-cb');
  if (allCb) { allCb.className = 'modal-cb' + (modalAllChecked ? ' checked' : ''); allCb.innerHTML = checkSvg; }
  document.querySelectorAll('.modal-check-row[data-a="modal-toggle"]').forEach(row => {
    const id = row.dataset.id;
    const item = modalLists.find(l => l.id === id);
    if (!item) return;
    const cb = row.querySelector('.modal-cb');
    if (cb) { cb.className = 'modal-cb' + (item.checked ? ' checked' : ''); cb.innerHTML = checkSvg; }
  });
  const selectedCount = modalLists.filter(l => l.checked).length;
  const btn = document.querySelector('[data-a="modal-confirm"]');
  if (btn) {
    const label = modalMode === 'export' ? 'エクスポート' : 'インポート';
    btn.textContent = `${label} (${selectedCount})`;
    btn.disabled = selectedCount === 0;
  }
}
function toggleModalAll() {
  modalAllChecked = !modalAllChecked;
  modalLists = modalLists.map(l => ({ ...l, checked: modalAllChecked }));
  renderModal();
}
function toggleModalItem(id) {
  modalLists = modalLists.map(l => l.id === id ? { ...l, checked: !l.checked } : l);
  modalAllChecked = modalLists.every(l => l.checked);
  renderModal();
}
function openExportModal() {
  modalMode = 'export';
  modalLists = lists.map(l => ({ id: l.id, name: l.name, checked: true }));
  modalAllChecked = true;
  render();
}
function executeExport() {
  const selectedIds = new Set(modalLists.filter(l => l.checked).map(l => l.id));
  if (selectedIds.size === 0) return;
  const payload = {
    version: 1,
    exportedAt: new Date().toISOString(),
    lists: lists.filter(l => selectedIds.has(l.id)),
    todos: todos.filter(t => selectedIds.has(t.listId)),
    trash: trash.filter(t => selectedIds.has(t.listId)),
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `tasks-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  closeModal();
}
function openImportModal() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => processImportFile(ev.target.result);
    reader.readAsText(file);
  };
  input.click();
}
function processImportFile(text) {
  try {
    const data = JSON.parse(text);
    if (!validateImportData(data)) { alert('無効なファイル形式です。'); return; }
    importPayload = data;
    modalMode = 'import';
    modalLists = data.lists.map(l => ({
      id: l.id, name: l.name, checked: true,
      todoCount: (data.todos || []).filter(t => t.listId === l.id).length,
    }));
    modalAllChecked = true;
    render();
  } catch { alert('ファイルの読み込みに失敗しました。'); }
}
function validateImportData(data) {
  if (!data || typeof data !== 'object') return false;
  if (!Array.isArray(data.lists) || data.lists.length === 0) return false;
  if (!Array.isArray(data.todos)) return false;
  if (!data.lists.every(l => l.id && l.name)) return false;
  return true;
}
function executeImport() {
  const selectedIds = new Set(modalLists.filter(l => l.checked).map(l => l.id));
  if (selectedIds.size === 0 || !importPayload) return;
  const idMap = new Map();
  const existingNames = new Set(lists.map(l => l.name));
  for (const l of importPayload.lists) {
    if (!selectedIds.has(l.id)) continue;
    const newId = crypto.randomUUID();
    idMap.set(l.id, newId);
    let name = l.name;
    if (existingNames.has(name)) {
      let n = 2;
      while (existingNames.has(`${l.name} (${n})`)) n++;
      name = `${l.name} (${n})`;
    }
    existingNames.add(name);
    lists.push({ id: newId, name, createdAt: l.createdAt || Date.now() });
  }
  for (const t of (importPayload.todos || [])) {
    if (!selectedIds.has(t.listId)) continue;
    const newListId = idMap.get(t.listId);
    if (!newListId) continue;
    todos.push({ ...t, id: crypto.randomUUID(), listId: newListId });
  }
  for (const t of (importPayload.trash || [])) {
    if (!selectedIds.has(t.listId)) continue;
    const newListId = idMap.get(t.listId);
    if (!newListId) continue;
    trash.push({ ...t, id: crypto.randomUUID(), listId: newListId });
  }
  save();
  const firstImported = idMap.values().next().value;
  if (firstImported) { selectedListId = firstImported; filter = 'all'; showTrash = false; }
  closeModal();
}

// ── Drag visual helpers ─────────────────────────────────
function setDragOver(el) {
  if (dragOverEl === el) return;
  if (dragOverEl) dragOverEl.classList.remove('drag-over');
  dragOverEl = el;
  if (dragOverEl) dragOverEl.classList.add('drag-over');
}
function clearDragOver() { setDragOver(null); }

// ── Event handlers ─────────────────────────────────────
document.addEventListener('click', e => {
  // メモポップアップを外クリックで閉じる
  if (memoPopupId && !e.target.closest('#memo-popup') && !e.target.closest('[data-a="memo-show"]')) {
    memoPopupId = null; render(); return;
  }

  const fb = e.target.closest('.filter-btn[data-filter]');
  if (fb && !dragTrashId) { setFilter(fb.dataset.filter); return; }

  // デスクトップ: 日付入力エリアクリック時にfocusしてピッカーを開く（focusinで処理）
  if (!isMobile() && e.target.closest('.edit-date-wrap')) {
    const dateInput = document.getElementById('ei-date');
    if (dateInput) dateInput.focus();
    return;
  }

  const el = e.target.closest('[data-a]');
  const a  = el?.dataset.a;
  const id = e.target.closest('[data-id]')?.dataset.id;
  if (!a) return;
  switch (a) {
    case 'dark':         toggleDark(); break;
    case 'toggle-sidebar': sidebarOpen = !sidebarOpen; render(); break;
    case 'toggle':       e.stopPropagation(); toggleTodo(id); break;
    case 'to-trash':     e.stopPropagation(); moveToTrash(id); break;
    case 'toggle-trash': toggleTrash(); break;
    case 'save':         commitEdit(); break;
    case 'cancel':       cancelEdit(); break;
    case 'clr-date':     editDue = ''; skipFocusRestore = true; render(); break;
    case 'clr-folder':   editFolderPath = ''; skipFocusRestore = true; render(); break;
    case 'memo-show':    e.stopPropagation(); memoPopupId = (memoPopupId === id) ? null : id; render(); break;
    case 'folder-open': {
      e.stopPropagation();
      const ft = todos.find(x => x.id === id);
      if (ft?.folderPath) {
        navigator.clipboard.writeText(ft.folderPath)
          .then(() => showToast('📋 パスをクリップボードにコピーしました'))
          .catch(() => {
            const ta = document.createElement('textarea');
            ta.value = ft.folderPath;
            ta.style.cssText = 'position:fixed;left:-9999px;opacity:0;';
            document.body.appendChild(ta); ta.focus(); ta.select();
            const ok = document.execCommand('copy');
            document.body.removeChild(ta);
            showToast(ok ? '📋 パスをクリップボードにコピーしました' : 'コピーできませんでした');
          });
      }
      break;
    }
    case 'restore':      restoreFromTrash(id); break;
    case 'del-trash':    deleteFromTrash(id); break;
    case 'empty':        emptyTrash(); break;
    case 'select-list':  selectList(id); break;
    case 'del-list':     e.stopPropagation(); handleDeleteList(id); break;
    case 'start-add-list': addingList = true; newListName = ''; render(); break;
    case 'open-export':     openExportModal(); break;
    case 'open-import':     openImportModal(); break;
    case 'modal-close':     closeModal(); break;
    case 'modal-overlay':   if (e.target.classList.contains('modal-overlay')) closeModal(); break;
    case 'modal-toggle-all': toggleModalAll(); break;
    case 'modal-toggle':    toggleModalItem(id); break;
    case 'modal-confirm':   if (modalMode === 'export') executeExport(); else executeImport(); break;
    case 'toggle-list-trash': toggleListTrash(); break;
    case 'toggle-stats': toggleListStats(); break;
    case 'toggle-list-expand': toggleListExpand(); break;
    case 'close-move-popup': closeMovePopup(); break;
    case 'move-popup-body': break; // ポップアップ内クリックは何もしない（オーバーレイへの伝播防止）
    case 'move-to-list': moveToList(el.dataset.todoId, el.dataset.listId); break;
    case 'restore-list':      { const idx = e.target.closest('[data-idx]')?.dataset.idx; if (idx != null) restoreList(+idx); break; }
    case 'del-list-permanent': { e.stopPropagation(); const idx = e.target.closest('[data-idx]')?.dataset.idx; if (idx != null) deleteListPermanently(+idx); break; }
    case 'empty-list-trash':  emptyListTrash(); break;
  }
});

document.addEventListener('submit', e => {
  const form = e.target.closest('[data-a="add"]');
  if (form) { e.preventDefault(); addTodo(form); }
});

document.addEventListener('dblclick', e => {
  const todoItem = e.target.closest('.todo-item');
  if (todoItem) {
    if (e.target.closest('.cb-wrap') || e.target.closest('.item-del')) return;
    if (editId !== todoItem.dataset.id) startEdit(todoItem.dataset.id);
    return;
  }
  const listItem = e.target.closest('.list-nav-item');
  if (listItem && !e.target.closest('button')) {
    const lid = listItem.dataset.id;
    if (lid && editingListId !== lid) startRenameList(lid);
  }
});

// モバイル向けダブルタップ検出
(function() {
  const DOUBLE_TAP_MS = 300;
  let lastTap = 0, lastTarget = null;
  document.addEventListener('touchend', e => {
    if (!('ontouchstart' in window)) return;
    const now = Date.now();
    const target = e.target;
    const elapsed = now - lastTap;
    const sameTarget = lastTarget && (
      target === lastTarget || target.closest('.todo-item') === lastTarget.closest('.todo-item') ||
      target.closest('.list-nav-item') === lastTarget.closest('.list-nav-item')
    );
    if (elapsed < DOUBLE_TAP_MS && sameTarget) {
      // ダブルタップ確定
      const todoItem = target.closest('.todo-item');
      if (todoItem && !target.closest('.cb-wrap') && !target.closest('.item-del') && !target.closest('.drag-handle')) {
        e.preventDefault();
        if (editId !== todoItem.dataset.id) startEdit(todoItem.dataset.id);
        lastTap = 0; lastTarget = null;
        return;
      }
      const listItem = target.closest('.list-nav-item[data-a="select-list"]');
      if (listItem && !target.closest('button') && !target.closest('input')) {
        e.preventDefault();
        if (editingListId !== listItem.dataset.id) startRenameList(listItem.dataset.id);
        lastTap = 0; lastTarget = null;
        return;
      }
    }
    lastTap = now;
    lastTarget = target;
  });
})();

// 日付入力：focus時の値を記録
document.addEventListener('focusin', e => {
  if (e.target.id === 'ei-date') {
    e.target.dataset.prev = e.target.value;
    if (!isMobile() && e.target.showPicker) { try { e.target.showPicker(); } catch(_){} }
  }
});

const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
document.addEventListener('change', e => {
  if (e.target.id === 'ei-date') {
    const val = e.target.value;
    editDue = val;
    // iOS Safari: ホイール回転でchangeが発火するため非空値は描画しない（focusoutで処理）
    if (!val || !isIOS) { skipFocusRestore = true; render(); }
  }
});

document.addEventListener('input', e => {
  if (e.target.id === 'ei-text')         editText         = e.target.value;
  if (e.target.id === 'ei-detail')       editDetail       = e.target.value;
  if (e.target.id === 'ei-folder')       editFolderPath   = e.target.value;
  if (e.target.id === 'list-rename-inp') editingListName  = e.target.value;
  if (e.target.id === 'list-add-inp')    newListName      = e.target.value;
});

document.addEventListener('keydown', e => {
  if (modalMode && e.key === 'Escape') { closeModal(); return; }
  if (e.target.id === 'ei-text') {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); commitEdit(); }
    if (e.key === 'Escape') { e.preventDefault(); cancelEdit(); }
  }
  if (e.target.id === 'list-rename-inp') {
    if (e.key === 'Enter')  { e.preventDefault(); commitRenameList(); }
    if (e.key === 'Escape') { editingListId = null; render(); }
  }
  if (e.target.id === 'list-add-inp') {
    if (e.key === 'Enter')  { e.preventDefault(); commitAddList(); }
    if (e.key === 'Escape') { addingList = false; newListName = ''; render(); }
  }
  // textarea追加欄: Enter=追加, Shift+Enter=改行
  if (e.target.id === 'todo-inp' || e.target.id === 'todo-inp-mobile') {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addTodo(e.target.closest('form')); }
  }
});

// focusout：日付確定・リスト名確定をまとめて処理
document.addEventListener('focusout', e => {
  if (e.target.id === 'ei-date') {
    const val = e.target.value;
    if (val && val !== e.target.dataset.prev) {
      const dueBefore = editDue;
      setTimeout(() => {
        if (editId && editDue === dueBefore) { editDue = val; render(); }
      }, 150);
    }
  }
  if (e.target.id === 'list-rename-inp' && editingListId) commitRenameList();
  if (e.target.id === 'list-add-inp' && addingList) {
    if (newListName.trim()) commitAddList();
    else { addingList = false; newListName = ''; render(); }
  }
});

// ── Drag & Drop (デスクトップのみ) ─────────────────────
document.addEventListener('dragstart', e => {
  const todo  = e.target.closest('.todo-item');
  const trsh  = e.target.closest('.trash-item');
  const lnav  = e.target.closest('.list-nav-item[data-a="select-list"]');
  if (todo)  { dragTodoId  = todo.dataset.id;  e.dataTransfer.effectAllowed = 'move'; setTimeout(() => todo.classList.add('dragging'),  0); }
  else if (trsh)  { dragTrashId = trsh.dataset.id;  e.dataTransfer.effectAllowed = 'move'; setTimeout(() => trsh.classList.add('dragging'), 0); }
  else if (lnav) { dragListId = lnav.dataset.id; e.dataTransfer.effectAllowed = 'move'; setTimeout(() => lnav.classList.add('dragging'), 0); }
});

document.addEventListener('dragend', () => {
  document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
  clearDragOver();
  dragTodoId = null; dragTrashId = null; dragListId = null;
});

document.addEventListener('dragover', e => {
  if (!dragTodoId && !dragTrashId && !dragListId) return;
  if (dragListId) {
    const overList = e.target.closest('.list-nav-item[data-a="select-list"]');
    if (overList && overList.dataset.id !== dragListId) { e.preventDefault(); setDragOver(overList); }
    else clearDragOver();
    return;
  }
  if (dragTodoId) {
    const overTodo   = e.target.closest('.todo-item');
    const overTBtn   = e.target.closest('#trash-btn');
    const overTPanel = e.target.closest('#trash-panel');
    const overList   = e.target.closest('.list-nav-item[data-a="select-list"]');
    if (overTodo || overTBtn || overTPanel || overList) e.preventDefault();
    if      (overTodo && overTodo.dataset.id !== dragTodoId) setDragOver(overTodo);
    else if (overList && overList.dataset.id !== selectedListId) setDragOver(overList);
    else if (overTBtn)   setDragOver(overTBtn);
    else if (overTPanel) setDragOver(overTPanel);
    else clearDragOver();
    return;
  }
  if (dragTrashId) {
    const overFilter = e.target.closest('.filter-btn[data-filter]');
    if (overFilter) { e.preventDefault(); setDragOver(overFilter); }
    else clearDragOver();
  }
});

document.addEventListener('drop', e => {
  e.preventDefault();
  clearDragOver();
  if (dragListId) {
    const onList = e.target.closest('.list-nav-item[data-a="select-list"]');
    if (onList && onList.dataset.id !== dragListId) reorderList(dragListId, onList.dataset.id);
    dragListId = null; return;
  }
  if (dragTodoId) {
    const onTodo  = e.target.closest('.todo-item');
    const onTrash = e.target.closest('#trash-btn, #trash-panel');
    const onList  = e.target.closest('.list-nav-item[data-a="select-list"]');
    if (onList && onList.dataset.id !== selectedListId) {
      const t = todos.find(x => x.id === dragTodoId);
      if (t) { t.listId = onList.dataset.id; save(); render(); }
    } else if (onTodo && onTodo.dataset.id !== dragTodoId) reorder(dragTodoId, onTodo.dataset.id);
    else if (onTrash) moveToTrash(dragTodoId);
    dragTodoId = null; return;
  }
  if (dragTrashId) {
    const onFilter = e.target.closest('.filter-btn[data-filter]');
    if (onFilter) {
      const f = onFilter.dataset.filter;
      const asC = f === 'active' ? false : f === 'completed' ? true : undefined;
      restoreFromTrash(dragTrashId, asC);
      setFilter(f);
    }
    dragTrashId = null;
  }
});

// ── File Drag & Drop Import ─────────────────────────────
let fileDragCounter = 0;
document.addEventListener('dragover', e => {
  if (dragTodoId || dragTrashId) return;
  if (e.dataTransfer && e.dataTransfer.types.includes('Files')) e.preventDefault();
});
document.addEventListener('dragenter', e => {
  if (dragTodoId || dragTrashId) return;
  if (!e.dataTransfer || !e.dataTransfer.types.includes('Files')) return;
  fileDragCounter++;
  if (!fileDragOver) { fileDragOver = true; render(); }
});
document.addEventListener('dragleave', e => {
  if (dragTodoId || dragTrashId) return;
  fileDragCounter--;
  if (fileDragCounter <= 0) { fileDragCounter = 0; if (fileDragOver) { fileDragOver = false; render(); } }
});
document.addEventListener('drop', e => {
  if (dragTodoId || dragTrashId) return;
  fileDragCounter = 0;
  if (fileDragOver) { fileDragOver = false; render(); }
  const files = e.dataTransfer?.files;
  if (!files || files.length === 0) return;
  const file = files[0];
  if (!file.name.endsWith('.json')) { alert('JSONファイルのみインポート可能です。'); return; }
  e.preventDefault();
  const reader = new FileReader();
  reader.onload = ev => processImportFile(ev.target.result);
  reader.readAsText(file);
}, true);

// ── Mobile Touch Sort ─────────────────────────────────
(function() {
  let touchDragId = null, lastOverId = null;
  let longPressTimer = null, touchStartY = 0, touchStartX = 0;
  const LONG_PRESS = 400;

  let listTouchDragId = null, lastListOverId = null;

  document.addEventListener('touchstart', e => {
    if (!('ontouchstart' in window)) return;
    // タスク並び替え（ドラッグハンドル長押し）
    const handle = e.target.closest('[data-a="drag-handle"]');
    if (handle) {
      const item = handle.closest('.todo-item');
      if (!item || item.querySelector('.edit-form')) return;
      touchStartY = e.touches[0].clientY;
      touchStartX = e.touches[0].clientX;
      longPressTimer = setTimeout(() => {
        touchDragId = item.dataset.id;

        item.classList.add('touch-dragging');
        navigator.vibrate && navigator.vibrate(30);
      }, LONG_PRESS);
      return;
    }
    // タスクのリスト間移動（テキスト部分長押し）
    if (lists.length > 1) {
      const todoItem = e.target.closest('.todo-item');
      if (todoItem && !e.target.closest('.cb-wrap') && !e.target.closest('.item-del') && !todoItem.querySelector('.edit-form')) {
        const moveTimer = setTimeout(() => {
          navigator.vibrate && navigator.vibrate(30);
          showMovePopup(todoItem.dataset.id);
        }, LONG_PRESS);
        const clearMove = () => { clearTimeout(moveTimer); document.removeEventListener('touchend', clearMove); document.removeEventListener('touchmove', onMoveMove); };
        const onMoveMove = (ev) => { const dy = Math.abs(ev.touches[0].clientY - e.touches[0].clientY); const dx = Math.abs(ev.touches[0].clientX - e.touches[0].clientX); if (dy > 8 || dx > 8) clearMove(); };
        document.addEventListener('touchend', clearMove, { once: true });
        document.addEventListener('touchmove', onMoveMove, { passive: true });
        return;
      }
    }
    // リスト並び替え（リスト名長押し）
    const listItem = e.target.closest('.list-nav-item[data-a="select-list"]');
    if (listItem && !e.target.closest('button') && !e.target.closest('input')) {
      touchStartY = e.touches[0].clientY;
      touchStartX = e.touches[0].clientX;
      longPressTimer = setTimeout(() => {
        listTouchDragId = listItem.dataset.id;
        listItem.classList.add('list-touch-dragging');
        navigator.vibrate && navigator.vibrate(30);
      }, LONG_PRESS);
    }
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (!('ontouchstart' in window)) return;
    if (longPressTimer && !touchDragId && !listTouchDragId) {
      const dy = Math.abs(e.touches[0].clientY - touchStartY);
      const dx = Math.abs(e.touches[0].clientX - touchStartX);
      if (dy > 8 || dx > 8) { clearTimeout(longPressTimer); longPressTimer = null; }
    }
    const touch = e.touches[0];

    // タスク移動中
    if (touchDragId) {
      e.preventDefault();
      const els = document.elementsFromPoint(touch.clientX, touch.clientY);
      const overItem = els.find(el => el.classList.contains('todo-item') && el.dataset.id !== touchDragId);
      if (overItem) {
        if (lastOverId !== overItem.dataset.id) {
          document.querySelectorAll('.todo-item.touch-drag-over').forEach(el => el.classList.remove('touch-drag-over'));
          overItem.classList.add('touch-drag-over');
          lastOverId = overItem.dataset.id;
        }
      } else {
        document.querySelectorAll('.todo-item.touch-drag-over').forEach(el => el.classList.remove('touch-drag-over'));
        lastOverId = null;
      }
      return;
    }

    // リスト移動中（リスト編集中は無視）
    if (listTouchDragId) {
      e.preventDefault();
      const els = document.elementsFromPoint(touch.clientX, touch.clientY);
      const overItem = els.find(el => el.classList.contains('list-nav-item') && el.dataset.id && el.dataset.id !== listTouchDragId);
      if (overItem) {
        if (lastListOverId !== overItem.dataset.id) {
          document.querySelectorAll('.list-nav-item.list-touch-drag-over').forEach(el => el.classList.remove('list-touch-drag-over'));
          overItem.classList.add('list-touch-drag-over');
          lastListOverId = overItem.dataset.id;
        }
      } else {
        document.querySelectorAll('.list-nav-item.list-touch-drag-over').forEach(el => el.classList.remove('list-touch-drag-over'));
        lastListOverId = null;
      }
    }
  }, { passive: false });

  document.addEventListener('touchend', e => {
    if (!('ontouchstart' in window)) return;
    clearTimeout(longPressTimer); longPressTimer = null;

    if (touchDragId) {
      if (lastOverId) {
        reorder(touchDragId, lastOverId);
      } else {
        document.querySelectorAll('.touch-dragging,.touch-drag-over').forEach(el => {
          el.classList.remove('touch-dragging', 'touch-drag-over');
        });
        render();
      }
      touchDragId = null; lastOverId = null;
      return;
    }

    if (listTouchDragId) {
      if (lastListOverId) {
        reorderList(listTouchDragId, lastListOverId);
      } else {
        document.querySelectorAll('.list-touch-dragging,.list-touch-drag-over').forEach(el => {
          el.classList.remove('list-touch-dragging', 'list-touch-drag-over');
        });
        render();
      }
      listTouchDragId = null; lastListOverId = null;
    }
  });

  document.addEventListener('touchcancel', () => {
    clearTimeout(longPressTimer); longPressTimer = null;
    touchDragId = null; touchDragEl = null; lastOverId = null;
    listTouchDragId = null; lastListOverId = null;
    document.querySelectorAll('.touch-dragging,.touch-drag-over,.list-touch-dragging,.list-touch-drag-over').forEach(el => {
      el.classList.remove('touch-dragging', 'touch-drag-over', 'list-touch-dragging', 'list-touch-drag-over');
    });
  });
})();



// ── Init ───────────────────────────────────────────────
load();
render();
</script>
</body>
</html>
