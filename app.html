  <style>
    :root {
      --body-from:#f1f5f9; --body-via:#eef2ff; --body-to:#f5f3ff;
      --card:#fff; --card-border:#f3f4f6; --card-shadow:0 20px 25px -5px rgba(99,102,241,.1),0 8px 10px -6px rgba(99,102,241,.05);
      --input-bg:#f9fafb; --input-border:#e5e7eb;
      --t1:#1f2937; --t2:#6b7280; --t3:#9ca3af;
      --filter-bg:#f3f4f6; --filter-hover:rgba(255,255,255,.7);
      --filter-act-from:#fff; --filter-act-to:rgba(238,242,255,.8); --filter-act-text:#4338ca;
      --item-border:#f3f4f6; --item-hover:#f9fafb;
      --divider:#f3f4f6;
      --sidebar-act-bg:rgba(99,102,241,.06); --sidebar-act-text:#4338ca;
      --sidebar-pill-bg:#f3f4f6; --sidebar-pill-text:#9ca3af;
      --sidebar-act-pill-bg:#e0e7ff; --sidebar-act-pill-text:#4338ca;
    }
    html.dark {
      --body-from:#030712; --body-via:#0f172a; --body-to:#1e1b4b;
      --card:#111827; --card-border:#1f2937; --card-shadow:0 20px 25px -5px rgba(0,0,0,.6);
      --input-bg:#1f2937; --input-border:#374151;
      --t1:#f9fafb; --t2:#9ca3af; --t3:#6b7280;
      --filter-bg:#1f2937; --filter-hover:rgba(55,65,81,.7);
      --filter-act-from:rgba(99,102,241,.5); --filter-act-to:rgba(99,102,241,.2); --filter-act-text:#a5b4fc;
      --item-border:#1f2937; --item-hover:rgba(31,41,55,.6);
      --divider:#1f2937;
      --sidebar-act-bg:rgba(99,102,241,.2); --sidebar-act-text:#a5b4fc;
      --sidebar-pill-bg:#374151; --sidebar-pill-text:#6b7280;
      --sidebar-act-pill-bg:rgba(99,102,241,.35); --sidebar-act-pill-text:#a5b4fc;
    }
    html { background:#030712; }
    html:not(.dark) { background:#f1f5f9; }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }

    body {
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans',sans-serif;
      background:linear-gradient(135deg,var(--body-from),var(--body-via),var(--body-to));
      min-height:100vh; display:flex; align-items:flex-start; justify-content:center;
      padding:48px 16px 32px; color:var(--t1);
    }
    button { font-family:inherit; }
    .app { width:100%; max-width:58rem; }

    /* ── Header ── */
    .header {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:24px; padding:0 4px;
    }
    .header-left { display:flex; align-items:center; gap:10px; }
    .header-icon {
      width:32px; height:32px; border-radius:8px; background:#6366f1; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 10px 15px -3px rgba(99,102,241,.25);
    }
    .header-icon svg { width:16px; height:16px; }
    h1 { font-size:20px; font-weight:700; color:var(--t1); letter-spacing:-.025em; line-height:1.2; }
    .header-sub { font-size:11px; color:var(--t3); }
    .header-right { display:flex; align-items:center; gap:8px; }
    .dark-toggle {
      width:36px; height:36px; flex-shrink:0;
      display:flex; align-items:center; justify-content:center; border-radius:50%;
      background:var(--card); border:1px solid var(--input-border); cursor:pointer;
      color:var(--t2); transition:all .2s; box-shadow:0 1px 2px rgba(0,0,0,.05);
    }
    html.dark .dark-toggle { color:#fbbf24; }
    .dark-toggle:hover { border-color:#818cf8; }
    .dark-toggle svg { width:16px; height:16px; }

    /* モバイル用サイドバー開閉ボタン */
    .sidebar-toggle-btn {
      display:none;
      width:36px; height:36px; flex-shrink:0; align-items:center; justify-content:center;
      border-radius:50%; background:var(--card); border:1px solid var(--input-border);
      cursor:pointer; color:var(--t2); transition:all .2s; box-shadow:0 1px 2px rgba(0,0,0,.05);
    }
    .sidebar-toggle-btn svg { width:16px; height:16px; }
    .sidebar-toggle-btn.active { background:#6366f1; border-color:#6366f1; color:#fff; }

    /* ── 2-column layout ── */
    .layout { display:flex; gap:16px; align-items:flex-start; }
    .sidebar-col { width:208px; flex-shrink:0; }
    .main-col { flex:1; min-width:0; }

    /* ── Card ── */
    .card {
      background:var(--card); border-radius:16px; box-shadow:var(--card-shadow);
      border:1px solid var(--card-border); overflow:hidden; transition:background .3s,border-color .3s;
    }

    /* ── Sidebar ── */
    .sidebar-hd {
      padding:10px 16px; border-bottom:1px solid var(--divider);
      font-size:10px; font-weight:700; color:var(--t3);
      text-transform:uppercase; letter-spacing:.1em;
      display:flex; align-items:center; justify-content:space-between;
    }
    .stats-toggle {
      width:22px; height:22px; display:flex; align-items:center; justify-content:center;
      border-radius:6px; border:none; background:transparent; color:var(--t3);
      cursor:pointer; transition:all .15s; padding:0;
    }
    .stats-toggle:hover { background:var(--filter-bg); color:var(--t2); }
    .stats-toggle.active { color:#6366f1; }
    html.dark .stats-toggle.active { color:#a5b4fc; }
    .stats-toggle svg { width:12px; height:12px; }
    .list-expand-btn {
      width:100%; display:flex; align-items:center; justify-content:center; gap:4px;
      padding:6px 10px; font-size:11px; font-weight:500; color:var(--t3);
      background:none; border:none; cursor:pointer; border-radius:8px;
      transition:all .15s; font-family:inherit;
    }
    .list-expand-btn:hover { color:#6366f1; background:rgba(99,102,241,.07); }
    html.dark .list-expand-btn:hover { color:#a5b4fc; background:rgba(99,102,241,.15); }
    .list-expand-btn svg { width:12px; height:12px; transition:transform .2s; }
    .list-expand-btn.expanded svg { transform:rotate(180deg); }
    .list-nav { list-style:none; padding:8px; }
    .list-nav-item {
      padding:8px 10px; border-radius:10px; cursor:pointer;
      transition:background .15s; user-select:none;
      display:flex; align-items:center; gap:0;
    }
    .list-content { flex:1; min-width:0; }
    .list-nav-item:hover:not(.active) { background:var(--item-hover); }
    .list-nav-item.active { background:var(--sidebar-act-bg); }
    .list-nav-item.dragging { opacity:.4; }
    .list-nav-item.drag-over { background:rgba(99,102,241,.12); }
    .list-item-row { display:flex; align-items:center; gap:6px; min-width:0; }
    .list-drag-handle {
      display:flex; align-items:center; padding:0 2px 0 0;
      opacity:0; cursor:grab; color:#d1d5db; transition:opacity .15s; flex-shrink:0;
    }
    html.dark .list-drag-handle { color:#374151; }
    .list-nav-item:hover .list-drag-handle { opacity:1; }
    .list-drag-handle:active { cursor:grabbing; }
    .list-drag-handle svg { width:10px; height:10px; }
    .list-item-name {
      flex:1; min-width:0; font-size:14px; font-weight:500; color:var(--t1);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .list-nav-item.active .list-item-name { color:var(--sidebar-act-text); }
    .list-count-pill {
      flex-shrink:0; padding:1px 6px; border-radius:9999px;
      font-size:10px; font-weight:700;
      background:var(--sidebar-pill-bg); color:var(--sidebar-pill-text);
      cursor:default;
    }
    .list-count-pill.sel { background:var(--sidebar-act-pill-bg); color:var(--sidebar-act-pill-text); }
    .list-del-wrap { flex-shrink:0; position:relative; display:inline-flex; }
    .list-del-btn {
      width:20px; height:20px; display:flex; align-items:center; justify-content:center;
      background:none; border:none; cursor:pointer; border-radius:6px;
      color:#d1d5db; opacity:1; transition:all .15s;
    }
    html.dark .list-del-btn { color:#4b5563; }
    .list-del-btn:hover { color:#f87171; background:rgba(239,68,68,.07); }
    html.dark .list-del-btn:hover { background:rgba(239,68,68,.15); }
    .list-del-btn svg { width:12px; height:12px; }
    .sidebar-dots { display:flex; gap:2px; padding-left:2px; margin-top:4px; }
    .list-add-area { padding:4px 8px 10px; border-top:1px solid var(--divider); margin-top:2px; }
    .list-add-btn {
      width:100%; display:flex; align-items:center; gap:6px; padding:8px 10px; margin-top:4px;
      font-size:12px; font-weight:500; color:var(--t3); background:none; border:none;
      cursor:pointer; border-radius:10px; transition:all .15s;
    }
    .list-add-btn:hover { color:#6366f1; background:rgba(99,102,241,.07); }
    html.dark .list-add-btn:hover { color:#a5b4fc; background:rgba(99,102,241,.15); }
    .list-add-btn svg { width:14px; height:14px; }
    .list-add-form { padding:4px 2px 0; }
    .list-add-input, .list-rename-input {
      width:100%; padding:4px 8px; border-radius:8px; border:1px solid #818cf8;
      background:var(--card); color:var(--t1); font-size:12px; outline:none; font-family:inherit;
    }
    .list-add-input:focus, .list-rename-input:focus { box-shadow:0 0 0 2px rgba(99,102,241,.3); }

    /* ── List card header ── */
    .list-card-hd {
      padding:14px 20px; border-bottom:1px solid var(--divider);
      display:flex; align-items:center; gap:8px;
    }
    .list-card-icon {
      width:24px; height:24px; border-radius:6px; background:rgba(99,102,241,.85);
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
      box-shadow:0 1px 3px rgba(99,102,241,.3);
    }
    html.dark .list-card-icon { background:rgba(99,102,241,.75); }
    .list-card-icon svg { width:14px; height:14px; }
    .list-card-name { font-size:15px; font-weight:700; color:var(--t1); }

    /* ── Input ── */
    .input-section { padding:20px; border-bottom:1px solid var(--divider); }
    .input-row { display:flex; gap:8px; }
    .todo-input {
      flex:1; padding:10px 16px; border-radius:12px;
      border:1px solid var(--input-border); background:var(--input-bg);
      color:var(--t1); font-size:14px; outline:none; transition:all .2s;
      resize:none; overflow:hidden; min-height:38px; line-height:1.4;
      font-family:inherit; field-sizing:content;
    }
    .todo-input::placeholder { color:var(--t3); }
    .todo-input:focus { border-color:#818cf8; box-shadow:0 0 0 3px rgba(99,102,241,.2); }
    .add-btn {
      padding:10px 20px; background:rgba(99,102,241,.8); color:#fff;
      font-size:14px; font-weight:600; border:none; border-radius:12px; cursor:pointer;
      transition:all .15s; box-shadow:0 1px 2px rgba(99,102,241,.2);
      white-space:nowrap;
    }
    .add-btn:hover { background:rgba(99,102,241,.9); }
    .add-btn:active { transform:scale(.97); }

    /* ── Filters ── */
    .filters-section { padding:16px 20px 4px; }
    .filters { display:flex; background:var(--filter-bg); border-radius:12px; padding:4px; gap:4px; }
    .filter-btn {
      flex:1; padding:6px 4px; font-size:12px; font-weight:600;
      border:none; border-radius:8px; cursor:pointer; background:transparent;
      color:var(--t2); display:flex; flex-direction:column; align-items:center; gap:4px; transition:all .2s;
    }
    .filter-btn:hover:not(.active) { background:var(--filter-hover); color:var(--t1); }
    .filter-btn.active {
      background:linear-gradient(to bottom,var(--filter-act-from),var(--filter-act-to));
      color:var(--filter-act-text); box-shadow:0 1px 3px rgba(0,0,0,.1);
    }
    .filter-btn.drag-over { background:rgba(99,102,241,.15); color:#6366f1; transform:scale(1.05); }
    html.dark .filter-btn.drag-over { background:rgba(99,102,241,.3); color:#a5b4fc; }
    .filter-label { display:flex; align-items:center; gap:6px; }
    .count-pill {
      display:inline-flex; align-items:center; justify-content:center;
      padding:1px 6px; border-radius:9999px; font-size:10px; font-weight:700;
      background:#e5e7eb; color:#9ca3af;
    }
    html.dark .count-pill { background:#374151; color:#6b7280; }
    .filter-btn.active .count-pill { background:#e0e7ff; color:#4338ca; }
    html.dark .filter-btn.active .count-pill { background:rgba(99,102,241,.3); color:#a5b4fc; }
    .filter-btn.active .count-pill.cp-done { background:#f3f4f6; color:#6b7280; }
    html.dark .filter-btn.active .count-pill.cp-done { background:#4b5563; color:#d1d5db; }
    .dot-badges { display:flex; gap:2px; }
    .dot {
      width:16px; height:16px; border-radius:50%; font-size:9px; font-weight:700;
      display:flex; align-items:center; justify-content:center;
      cursor:default; position:relative;
    }
    .dot-ov  { background:#fecaca; color:#b91c1c; }
    .dot-td  { background:#fef3c7; color:#d97706; }
    .dot-fu  { background:#d1fae5; color:#059669; }
    .dot-nd  { background:#e2e8f0; color:#64748b; }
    .dot-dn  { background:#6366f1; color:#fff; }
    html.dark .dot-ov { background:rgba(239,68,68,.4);   color:#fca5a5; }
    html.dark .dot-td { background:rgba(245,158,11,.25);  color:#fbbf24; }
    html.dark .dot-fu { background:rgba(16,185,129,.25);  color:#34d399; }
    html.dark .dot-nd { background:#334155;               color:#94a3b8; }
    html.dark .dot-dn { background:#4f46e5;               color:#fff; }

    /* ── Todo list ── */
    .todo-list { list-style:none; padding:8px 12px; min-height:96px; }
    .empty-msg { padding:48px 0; text-align:center; color:var(--t3); font-size:14px; user-select:none; }
    .todo-item {
      display:flex; align-items:stretch; border-bottom:1px solid var(--item-border);
      border-radius:8px; transition:background .15s,opacity .15s; cursor:text; position:relative;
    }
    .todo-item:last-child { border-bottom:none; }
    .todo-item:hover:not(.drag-over) { background:var(--item-hover); }
    .todo-item.drag-over { background:rgba(99,102,241,.07); }
    html.dark .todo-item.drag-over { background:rgba(99,102,241,.15); }
    .todo-item.dragging { opacity:.4; }
    .drag-handle {
      display:flex; align-items:center; padding:0 4px 0 6px;
      opacity:0; cursor:grab; color:#d1d5db; transition:opacity .15s; flex-shrink:0;
    }
    html.dark .drag-handle { color:#374151; }
    .todo-item:hover .drag-handle { opacity:1; }
    .drag-handle:active { cursor:grabbing; }
    .drag-handle svg { width:12px; height:12px; }
    .cb-wrap { display:flex; align-items:center; padding:12px 14px 12px 6px; flex-shrink:0; }
    .cb {
      width:20px; height:20px; border-radius:50%; border:2px solid #d1d5db;
      background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:all .2s; flex-shrink:0;
    }
    html.dark .cb { border-color:#4b5563; }
    .cb:hover { border-color:#9ca3af; }
    html.dark .cb:hover { border-color:#6b7280; }
    .cb { transition:background .2s, border-color .2s, transform .15s; }
    .cb.checked { background:#6366f1; border-color:#6366f1; }
    .cb.checked.animate { animation:cbPop .25s ease; }
    .cb svg { width:12px; height:12px; display:none; }
    .cb.checked svg { display:block; }
    .cb.checked.animate svg { animation:checkIn .2s ease; }
    @keyframes cbPop {
      0%   { transform:scale(1); }
      40%  { transform:scale(1.25); }
      100% { transform:scale(1); }
    }
    @keyframes checkIn {
      0%   { opacity:0; transform:scale(0) rotate(-10deg); }
      60%  { transform:scale(1.2) rotate(5deg); }
      100% { opacity:1; transform:scale(1) rotate(0); }
    }
    .text-wrap { flex:1; min-width:0; padding:12px 12px 12px 0; display:flex; align-items:center; }
    .todo-text { font-size:14px; line-height:1.4; color:var(--t1); }
    .todo-text { transition:color .3s; }
    .todo-text.done {
      text-decoration:none;
      color:#d1d5db;
      background-image:linear-gradient(currentColor, currentColor);
      background-size:100% 1.5px;
      background-repeat:no-repeat;
      background-position:left 55%;
    }
    .todo-text.done.animate {
      background-size:0% 1.5px;
      animation:strikeThrough .35s ease forwards;
    }
    html.dark .todo-text.done { color:#4b5563; }
    @keyframes strikeThrough {
      0%   { background-size:0% 1.5px; }
      100% { background-size:100% 1.5px; }
    }
    .due-wrap { display:flex; align-items:center; padding:12px 4px 12px 0; flex-shrink:0; }
    .due-badge {
      display:inline-flex; align-items:center; gap:4px;
      padding:2px 6px; border-radius:6px; font-size:10px; font-weight:600; white-space:nowrap;
    }
    .due-badge svg { width:10px; height:10px; flex-shrink:0; }
    .due-ov { background:#fecaca; color:#b91c1c; }
    .due-td { background:#fef3c7; color:#f59e0b; }
    .due-fu { background:#d1fae5; color:#10b981; }
    html.dark .due-ov { background:rgba(239,68,68,.4);   color:#fca5a5; }
    html.dark .due-td { background:rgba(245,158,11,.25);  color:#f59e0b; }
    html.dark .due-fu { background:rgba(16,185,129,.25);  color:#10b981; }
    .item-del { display:flex; align-items:center; padding:12px 8px 12px 0; flex-shrink:0; }
    .item-del button {
      width:28px; height:28px; display:flex; align-items:center; justify-content:center;
      border-radius:8px; border:none; background:transparent; color:#d1d5db; cursor:pointer;
      opacity:0; transition:all .15s;
    }
    html.dark .item-del button { color:#374151; }
    .todo-item:hover .item-del button { opacity:1; }
    .item-del button:hover { color:#f87171; background:rgba(239,68,68,.07); }
    html.dark .item-del button:hover { background:rgba(239,68,68,.15); }
    .item-del svg { width:14px; height:14px; }
    .item-memo { display:flex; align-items:center; padding:12px 0 12px 0; flex-shrink:0; }
    .item-memo button {
      width:28px; height:28px; display:flex; align-items:center; justify-content:center;
      border-radius:8px; border:none; background:transparent; color:#94a3b8; cursor:pointer;
      transition:all .15s;
    }
    .item-memo button:hover { color:#6366f1; background:rgba(99,102,241,.1); }
    .item-memo button.active { color:#6366f1; background:rgba(99,102,241,.1); }
    html.dark .item-memo button { color:#475569; }
    html.dark .item-memo button:hover,
    html.dark .item-memo button.active { color:#a5b4fc; background:rgba(99,102,241,.2); }
    .item-memo svg { width:14px; height:14px; }
    .item-folder { display:flex; align-items:center; padding:12px 2px 12px 0; flex-shrink:0; }
    .item-folder button {
      width:28px; height:28px; display:flex; align-items:center; justify-content:center;
      border-radius:8px; border:none; background:transparent; color:#818cf8; cursor:pointer;
      transition:all .15s;
    }
    .item-folder button:hover { color:#6366f1; background:rgba(99,102,241,.1); }
    html.dark .item-folder button { color:#4f46e5; }
    html.dark .item-folder button:hover { color:#a5b4fc; background:rgba(99,102,241,.2); }
    .item-folder svg { width:14px; height:14px; }

    /* ── Edit form ── */
    .edit-form { width:100%; }
    .edit-text {
      width:100%; padding:4px 8px; border-radius:8px; border:1px solid #818cf8;
      background:var(--card); color:var(--t1); font-size:14px; outline:none; margin-bottom:6px; font-family:inherit;
      resize:none; overflow:hidden; line-height:1.4; field-sizing:content;
    }
    .edit-text:focus { box-shadow:0 0 0 2px rgba(99,102,241,.3); }
    .edit-actions { display:flex; flex-direction:column; gap:6px; }
    .edit-actions-row1 { display:flex; align-items:center; gap:6px; }
    .edit-actions-row2 { display:flex; align-items:center; gap:8px; }
    .edit-date {
      padding:4px 8px; border-radius:8px; border:1px solid var(--input-border);
      background:var(--card); color:var(--t1); font-size:12px; outline:none; font-family:inherit;
    }
    .edit-date:focus { box-shadow:0 0 0 2px rgba(99,102,241,.3); }
    .edit-date-placeholder {
      font-size:12px; color:var(--t3); padding:4px 8px;
      border-radius:8px; border:1px dashed var(--input-border);
      cursor:pointer; user-select:none;
    }
    /* 未選択時はinputを透明化してlabelを重ねる */
    .edit-date-wrap { position:relative; display:inline-flex; cursor:pointer; }
    .edit-date-wrap .edit-date {
      position:absolute; inset:0; opacity:0; width:100%; pointer-events:none;
    }
.edit-clr { font-size:12px; color:var(--t3); background:none; border:none; cursor:pointer; transition:color .15s; }
    .edit-clr:hover { color:#f87171; }
    .edit-save { margin-left:auto; padding:6px 16px; background:#6366f1; color:#fff; font-size:12px; font-weight:500; border:none; border-radius:8px; cursor:pointer; transition:background .15s; font-family:inherit; }
    .edit-save:hover { background:#4f46e5; }
    .edit-cancel { font-size:12px; color:var(--t3); background:none; border:none; cursor:pointer; transition:color .15s; font-family:inherit; }
    .edit-cancel:hover { color:var(--t1); }
    .edit-detail-inp {
      width:100%; padding:6px 8px; border-radius:8px; border:1px solid var(--input-border);
      background:var(--input-bg); color:var(--t2); font-size:13px; outline:none; font-family:inherit;
      resize:none; overflow:hidden; min-height:32px; line-height:1.5; field-sizing:content;
      margin-bottom:2px;
    }
    .edit-detail-inp:focus { box-shadow:0 0 0 2px rgba(99,102,241,.2); border-color:#818cf8; color:var(--t1); }
    .edit-detail-inp::placeholder { color:var(--t3); }
    /* メモポップアップ */
    .memo-popup {
      position:fixed; left:50%; transform:translateX(-50%);
      bottom:72px; z-index:95;
      background:var(--card); border:1px solid var(--card-border);
      border-radius:14px; padding:14px 18px;
      min-width:220px; max-width:min(400px, calc(100vw - 32px));
      max-height:50vh; overflow-y:auto;
      box-shadow:0 12px 40px rgba(0,0,0,.2);
      animation:fadeIn .15s ease;
    }
    html.dark .memo-popup { box-shadow:0 12px 40px rgba(0,0,0,.5); }
    .memo-popup-label {
      font-size:10px; font-weight:700; color:var(--t3);
      text-transform:uppercase; letter-spacing:.1em;
      display:block; margin-bottom:8px;
    }
    .memo-popup-text {
      font-size:13px; color:var(--t1); line-height:1.7;
      white-space:pre-wrap; word-break:break-word;
    }
    .edit-actions-row3 { display:flex; align-items:center; gap:6px; }
    .edit-folder-label {
      display:flex; align-items:center; gap:4px; font-size:11px; color:var(--t3); flex-shrink:0; white-space:nowrap;
    }
    .edit-folder-label svg { width:12px; height:12px; }
    .edit-folder-inp {
      flex:1; padding:4px 8px; border-radius:8px; border:1px solid var(--input-border);
      background:var(--card); color:var(--t1); font-size:12px; outline:none; font-family:inherit;
    }
    .edit-folder-inp:focus { box-shadow:0 0 0 2px rgba(99,102,241,.3); border-color:#818cf8; }
    .edit-folder-inp::placeholder { color:var(--t3); }
    .edit-folder-clr { font-size:12px; color:var(--t3); background:none; border:none; cursor:pointer; transition:color .15s; display:flex; align-items:center; flex-shrink:0; }
    .edit-folder-clr:hover { color:#f87171; }
    .edit-folder-clr svg { width:12px; height:12px; }
    /* トースト通知 */
    .toast {
      position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
      padding:8px 20px; background:#1f2937; color:#fff; border-radius:10px;
      font-size:13px; font-weight:500; z-index:300; pointer-events:none;
      white-space:nowrap; max-width:calc(100vw - 32px); text-align:center;
      box-shadow:0 8px 24px rgba(0,0,0,.25);
      animation:toastIn .2s ease, toastOut .3s ease 2s forwards;
    }
    html.dark .toast { background:#374151; }
    @keyframes toastIn  { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
    @keyframes toastOut { from{opacity:1} to{opacity:0} }

    /* ── Footer ── */
    .footer { padding:14px 20px; border-top:1px solid var(--divider); display:flex; align-items:center; justify-content:space-between; }
    .remaining { font-size:12px; color:var(--t3); }
    .remaining strong { color:#6366f1; font-weight:700; }
    .trash-btn {
      display:flex; align-items:center; gap:6px; padding:6px 12px;
      font-size:12px; font-weight:500; border-radius:8px; cursor:pointer;
      border:1px solid transparent; background:transparent; color:var(--t2); transition:all .15s;
    }
    .trash-btn:hover { background:var(--filter-bg); }
    .trash-btn.open { background:rgba(239,68,68,.07); color:#ef4444; border-color:#fecaca; }
    html.dark .trash-btn.open { background:rgba(239,68,68,.15); border-color:rgba(239,68,68,.4); }
    .trash-btn.drag-over { background:rgba(239,68,68,.12); color:#ef4444; border-color:#fca5a5; transform:scale(1.05); }
    html.dark .trash-btn.drag-over { background:rgba(239,68,68,.25); border-color:rgba(239,68,68,.5); }
    .trash-btn svg { width:14px; height:14px; }
    .trash-cnt {
      background:#fecaca; color:#b91c1c; border-radius:50%;
      width:16px; height:16px; display:flex; align-items:center; justify-content:center;
      font-size:10px; font-weight:700;
    }
    html.dark .trash-cnt { background:rgba(239,68,68,.4); color:#fca5a5; }

    /* ── Trash panel ── */
    .trash-panel {
      margin-top:12px; background:var(--card); border-radius:16px;
      box-shadow:0 10px 15px -3px rgba(0,0,0,.07); border:1px solid var(--card-border);
      overflow:hidden; transition:background .3s,border-color .3s,box-shadow .2s;
    }
    .trash-panel.drag-over { background:rgba(239,68,68,.05); border-color:#fca5a5; }
    html.dark .trash-panel.drag-over { background:rgba(239,68,68,.1); border-color:rgba(239,68,68,.4); }
    .trash-header {
      padding:14px 20px; border-bottom:1px solid var(--divider);
      display:flex; align-items:center; justify-content:space-between;
    }
    .trash-title {
      display:flex; align-items:center; gap:6px; font-size:11px; font-weight:700;
      color:var(--t2); text-transform:uppercase; letter-spacing:.05em;
    }
    .trash-title svg { width:14px; height:14px; }
    .empty-all {
      font-size:12px; font-weight:500; color:#f87171; background:none; border:none; cursor:pointer;
      padding:4px 10px; border-radius:8px; transition:all .15s; font-family:inherit;
    }
    .empty-all:hover { background:rgba(239,68,68,.07); color:#ef4444; }
    html.dark .empty-all:hover { background:rgba(239,68,68,.15); }
    .trash-list { list-style:none; padding:8px 12px; min-height:48px; }
    .trash-empty { padding:32px 0; text-align:center; color:var(--t3); font-size:14px; user-select:none; }
    .trash-item {
      display:flex; align-items:center; gap:8px; padding:10px 8px;
      border-bottom:1px solid var(--item-border); border-radius:8px;
      transition:background .15s,opacity .15s; cursor:grab;
    }
    .trash-item:last-child { border-bottom:none; }
    .trash-item:hover { background:var(--item-hover); }
    .trash-item.dragging { opacity:.4; }
    .trash-item-text {
      flex:1; min-width:0; font-size:14px; color:#9ca3af;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .trash-item-text.was-done { text-decoration:line-through; }
    html.dark .trash-item-text { color:#4b5563; }
    .trash-actions { display:flex; align-items:center; gap:4px; opacity:0; flex-shrink:0; transition:opacity .15s; }
    .trash-item:hover .trash-actions { opacity:1; }
    .restore-btn {
      display:flex; align-items:center; gap:4px; padding:4px 8px;
      font-size:12px; font-weight:500; color:#818cf8; background:none; border:none; cursor:pointer;
      border-radius:8px; transition:all .15s; font-family:inherit;
    }
    .restore-btn:hover { color:#6366f1; background:rgba(99,102,241,.07); }
    html.dark .restore-btn:hover { background:rgba(99,102,241,.15); }
    .restore-btn svg { width:12px; height:12px; }
    .tip-wrap { position:relative; display:inline-flex; }
    .del-btn {
      width:24px; height:24px; display:flex; align-items:center; justify-content:center;
      background:none; border:none; cursor:pointer; border-radius:8px; color:#d1d5db; transition:all .15s;
    }
    html.dark .del-btn { color:#374151; }
    .del-btn:hover { color:#f87171; background:rgba(239,68,68,.07); }
    html.dark .del-btn:hover { background:rgba(239,68,68,.15); }
    .del-btn svg { width:14px; height:14px; }
    .tip {
      position:absolute; bottom:100%; left:50%; transform:translateX(-50%);
      margin-bottom:6px; padding:2px 8px; background:#1f2937; color:#fff;
      font-size:10px; font-weight:500; border-radius:6px; white-space:nowrap;
      opacity:0; pointer-events:none; transition:opacity .15s; z-index:10;
    }
    html.dark .tip { background:#374151; }
    .tip-wrap:hover .tip { opacity:1; }

    /* ── Modal overlay ── */
    .modal-overlay {
      position:fixed; inset:0; z-index:100;
      background:rgba(0,0,0,.45);
      display:flex; align-items:center; justify-content:center;
      animation:fadeIn .15s ease;
      padding:16px;
    }
    html.dark .modal-overlay { background:rgba(0,0,0,.65); }
    .modal {
      background:var(--card); border-radius:16px; border:1px solid var(--card-border);
      box-shadow:0 25px 50px -12px rgba(0,0,0,.25);
      width:90%; max-width:420px; max-height:80vh;
      display:flex; flex-direction:column; overflow:hidden;
      animation:modalIn .2s ease;
    }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    @keyframes modalIn { from{opacity:0;transform:scale(.95) translateY(8px)} to{opacity:1;transform:none} }
    .modal-header {
      padding:16px 20px; border-bottom:1px solid var(--divider);
      display:flex; align-items:center; justify-content:space-between;
    }
    .modal-title { font-size:15px; font-weight:700; color:var(--t1); }
    .modal-close {
      width:28px; height:28px; display:flex; align-items:center; justify-content:center;
      border-radius:8px; border:none; background:transparent; color:var(--t2);
      cursor:pointer; transition:all .15s;
    }
    .modal-close:hover { background:var(--filter-bg); color:var(--t1); }
    .modal-close svg { width:14px; height:14px; }
    .modal-body { padding:12px 20px; overflow-y:auto; flex:1; }
    .modal-check-row {
      display:flex; align-items:center; gap:10px; padding:8px 0;
      border-bottom:1px solid var(--item-border); cursor:pointer; user-select:none;
    }
    .modal-check-row:last-child { border-bottom:none; }
    .modal-check-row.select-all {
      font-weight:700; font-size:13px; color:var(--t2);
      padding-bottom:10px; margin-bottom:4px;
      border-bottom:2px solid var(--divider);
    }
    .modal-cb {
      width:18px; height:18px; border-radius:4px; border:2px solid #d1d5db;
      background:transparent; display:flex; align-items:center; justify-content:center;
      flex-shrink:0; transition:all .15s; cursor:pointer;
    }
    html.dark .modal-cb { border-color:#4b5563; }
    .modal-cb.checked { background:#6366f1; border-color:#6366f1; }
    .modal-cb svg { width:12px; height:12px; display:none; }
    .modal-cb.checked svg { display:block; }
    .modal-list-name {
      flex:1; font-size:14px; color:var(--t1);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .modal-list-count { flex-shrink:0; font-size:11px; color:var(--t3); }
    .modal-footer {
      padding:12px 20px; border-top:1px solid var(--divider);
      display:flex; align-items:center; justify-content:flex-end; gap:8px;
    }
    .modal-btn-cancel {
      padding:8px 16px; font-size:13px; font-weight:500; border-radius:10px;
      border:1px solid var(--input-border); background:var(--card); color:var(--t2);
      cursor:pointer; transition:all .15s; font-family:inherit;
    }
    .modal-btn-cancel:hover { border-color:#818cf8; color:var(--t1); }
    .modal-btn-primary {
      padding:8px 16px; font-size:13px; font-weight:600; border-radius:10px;
      border:none; background:rgba(99,102,241,.8); color:#fff;
      cursor:pointer; transition:all .15s; font-family:inherit;
      box-shadow:0 1px 2px rgba(99,102,241,.2);
    }
    .modal-btn-primary:hover { background:rgba(99,102,241,.9); }
    .modal-btn-primary:disabled { opacity:.4; cursor:not-allowed; }

    /* ── Sidebar IO buttons ── */
    .io-area { padding:8px; border-top:1px solid var(--divider); display:flex; gap:4px; }
    .io-btn {
      flex:1; display:flex; align-items:center; justify-content:center; gap:4px;
      padding:6px 0; font-size:11px; font-weight:500; color:var(--t3);
      background:none; border:none; cursor:pointer; border-radius:8px;
      transition:all .15s; font-family:inherit;
    }
    .io-btn:hover { color:#6366f1; background:rgba(99,102,241,.07); }
    html.dark .io-btn:hover { color:#a5b4fc; background:rgba(99,102,241,.15); }
    .io-btn svg { width:12px; height:12px; }

    /* ── Move-to-list popup ── */
    .move-popup-overlay {
      position:fixed; inset:0; z-index:100;
      background:rgba(0,0,0,.45);
      display:flex; align-items:flex-end; justify-content:center;
      animation:fadeIn .15s ease;
      padding:0;
    }
    html.dark .move-popup-overlay { background:rgba(0,0,0,.65); }
    .move-popup {
      background:var(--card); border-radius:16px 16px 0 0; border:1px solid var(--card-border);
      border-bottom:none;
      box-shadow:0 -10px 40px rgba(0,0,0,.15);
      width:100%; max-width:500px;
      animation:movePopupIn .2s ease;
      padding-bottom:env(safe-area-inset-bottom);
    }
    @keyframes movePopupIn { from{transform:translateY(100%)} to{transform:translateY(0)} }
    .move-popup-header {
      padding:16px 20px 8px; display:flex; align-items:center; justify-content:space-between;
    }
    .move-popup-title { font-size:14px; font-weight:700; color:var(--t1); }
    .move-popup-task { padding:0 20px 12px; font-size:12px; color:var(--t3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .move-popup-list {
      list-style:none; padding:0 8px 8px; max-height:50vh; overflow-y:auto;
    }
    .move-popup-item {
      display:flex; align-items:center; gap:10px; padding:12px;
      border-radius:10px; cursor:pointer; transition:background .15s; user-select:none;
    }
    .move-popup-item:hover { background:var(--item-hover); }
    .move-popup-item:active { background:rgba(99,102,241,.1); }
    .move-popup-item-name { flex:1; font-size:14px; font-weight:500; color:var(--t1); }
    .move-popup-item-count { font-size:11px; color:var(--t3); }
    .move-popup-item-icon { color:#6366f1; flex-shrink:0; }
    .move-popup-item-icon svg { width:16px; height:16px; }

    /* ── File drop zone overlay ── */
    .drop-zone-overlay {
      position:fixed; inset:0; z-index:200;
      background:rgba(99,102,241,.08);
      border:3px dashed #6366f1;
      display:flex; align-items:center; justify-content:center;
      pointer-events:none;
    }
    html.dark .drop-zone-overlay { background:rgba(99,102,241,.15); border-color:#818cf8; }
    .drop-zone-text {
      padding:16px 32px; border-radius:16px;
      background:var(--card); border:1px solid var(--card-border);
      box-shadow:0 10px 25px rgba(0,0,0,.15);
      font-size:16px; font-weight:700; color:#6366f1;
    }
    html.dark .drop-zone-text { color:#a5b4fc; }

    /* ── Sidebar list trash ── */
    .sidebar-trash-section { border-top:1px solid var(--divider); }
    .sidebar-trash-hd {
      padding:8px 16px 4px; display:flex; align-items:center; justify-content:space-between;
    }
    .sidebar-trash-title {
      font-size:10px; font-weight:700; color:var(--t3);
      text-transform:uppercase; letter-spacing:.1em;
      display:flex; align-items:center; gap:4px;
    }
    .sidebar-trash-toggle { padding:4px 8px; border-top:1px solid var(--divider); }
    .sidebar-trash-toggle .list-add-btn { margin-top:0; }
    .sidebar-trash-toggle .list-add-btn.open { background:rgba(239,68,68,.07); color:#ef4444; }
    html.dark .sidebar-trash-toggle .list-add-btn.open { background:rgba(239,68,68,.15); color:#ef4444; }
    .list-trash-item { padding:6px 10px; }
    .list-trash-item .list-item-name { color:var(--t3); }
    .list-trash-actions { display:flex; gap:2px; flex-shrink:0; }
    .list-trash-actions .list-del-btn { opacity:1; }
    .list-trash-actions .list-del-btn.restore-color { color:#818cf8; }
    .sidebar-trash-empty { padding:16px 0; font-size:12px; }
    .sidebar-trash-list { padding:4px 8px; }
    .empty-all-sm { font-size:10px; padding:2px 6px; }
    .trash-cnt-sm { width:14px; height:14px; font-size:9px; }

    /* ── モバイル用 固定入力バー ── */
    .input-bar-mobile {
      display:none;
      position:fixed; bottom:0; left:0; right:0; z-index:90;
      background:var(--card);
      border-top:1px solid var(--card-border);
      padding:10px 12px calc(10px + env(safe-area-inset-bottom));
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      box-shadow:0 -8px 24px rgba(0,0,0,.06);
    }
    html.dark .input-bar-mobile {
      box-shadow:0 -8px 24px rgba(0,0,0,.3);
    }
    .input-bar-mobile .input-row { display:flex; gap:8px; }
    .input-bar-mobile .todo-input { flex:1; font-size:16px; padding:10px 12px; }
    .input-bar-mobile .add-btn { flex-shrink:0; padding:10px 16px; font-size:14px; }

    /* ══════════════════════════════════════════
       モバイル対応 (max-width: 640px)
    ══════════════════════════════════════════ */
    @media (max-width: 640px), (max-width: 1024px) and (pointer: coarse) {
      /* 長押しコンテキストメニュー・テキスト選択を抑制 */
      .todo-item, .list-nav-item, .drag-handle, .cb, .dot, .due-badge, .filter-btn, .trash-btn {
        -webkit-touch-callout:none;
        -webkit-user-select:none;
        user-select:none;
      }

      body {
        padding:calc(12px + env(safe-area-inset-top)) calc(12px + env(safe-area-inset-right)) 32px calc(12px + env(safe-area-inset-left));
        align-items:flex-start;
      }

      .app { max-width:100%; }

      /* ヘッダー */
      .header { margin-bottom:12px; }
      h1 { font-size:17px; }
      .sidebar-toggle-btn { display:flex; }

      /* レイアウト：縦積みに変更 */
      .layout { flex-direction:column; gap:12px; }
      .sidebar-col { width:100%; }
      .main-col { width:100%; }

      /* サイドバー：デフォルト非表示、開いたら上に展開 */
      .sidebar-col { display:none; }
      .sidebar-col.open { display:block; }

      /* インプット：カード内は非表示、固定バーを使用 */
      .input-section { display:none; }
      .input-bar-mobile { display:block; }
      .main-col { padding-bottom:calc(80px + env(safe-area-inset-bottom)); }

      /* フィルター */
      .filters-section { padding:12px 14px 4px; }
      .filter-btn { font-size:11px; padding:6px 2px; }

        /* タスクリスト */
      .todo-list { padding:6px 8px; }
      .drag-handle { display:flex; opacity:1; padding:0 8px 0 4px; }
      .list-drag-handle { display:flex; opacity:1; padding:0 4px 0 0; }
      .todo-item.touch-dragging {
        opacity:.35; background:rgba(99,102,241,.08);
        border:1.5px dashed #818cf8; border-radius:8px;
      }
      .todo-item.touch-drag-over {
        background:rgba(99,102,241,.15); border-radius:8px;
        border-left:3px solid #6366f1;
        transform:scale(1.02);
        transition:transform .15s, background .15s;
      }
      .list-nav-item.list-touch-dragging {
        opacity:.35; background:rgba(99,102,241,.08);
        border:1.5px dashed #818cf8; border-radius:10px;
      }
      .list-nav-item.list-touch-drag-over {
        background:rgba(99,102,241,.15); border-radius:10px;
        border-left:3px solid #6366f1;
        transform:scale(1.02);
        transition:transform .15s, background .15s;
      }

      /* タスクアイテム：削除ボタンを常時表示 */
      .item-del button { opacity:1; }
      .trash-actions { opacity:1; }

      /* 期限バッジを省スペース化 */
      .due-badge { font-size:9px; padding:2px 4px; }

      /* フッター */
      .footer { padding:10px 14px; }

      /* ゴミ箱パネル */
      .trash-panel { margin-top:8px; }
      .trash-header { padding:12px 14px; }
      .trash-list { padding:6px 8px; }

      /* モーダル：下から出るシート形式 */
      .modal { width:100%; max-width:100%; max-height:90vh; border-radius:20px 20px 0 0; }
      .modal-overlay { align-items:flex-end; padding:0; }

      /* ドットバッジ：サイドバー内 */
      .sidebar-dots { flex-wrap:wrap; }

      /* リスト追加フォーム */
      .list-add-input, .list-rename-input { font-size:16px; }

      /* 編集フォーム */
      .edit-text { font-size:16px; }
      .edit-actions { gap:6px; }
      .edit-date { font-size:12px; }
      .edit-date-wrap .edit-date { pointer-events:auto; }
    }


  </style>
</head>
<body>
<div id="app" class="app"></div>
<script>
// ── State ──────────────────────────────────────────────
let todos = [], trash = [], lists = [], selectedListId = '';
let filter = 'all', showTrash = false;
let editId = null, editText = '', editDue = '', editFolderPath = '', editDetail = '', skipFocusRestore = false;
let memoPopupId = null;
let editingListId = null, editingListName = '';
let addingList = false, newListName = '';
let dragTodoId = null, dragTrashId = null, dragListId = null, dragOverEl = null;
let modalMode = null, modalLists = [], modalAllChecked = false, importPayload = null;
let fileDragOver = false;
let listTrash = [], showListTrash = false;
let sidebarOpen = false; // モバイル用サイドバー開閉状態
let showListStats = localStorage.getItem('todo-app-show-stats') !== 'false'; // リストステータス表示
let listExpanded = false; // リスト一覧の展開状態
const LIST_COLLAPSE_LIMIT = 5; // 折りたたみ時の表示件数
let movePopupTodoId = null; // リスト移動ポップアップ対象タスクID

// ── Persistence ────────────────────────────────────────
function load() {
  try { lists = JSON.parse(localStorage.getItem('todo-app-lists') || '[]'); } catch { lists = []; }
  if (!lists.length) {
    lists = [{ id: crypto.randomUUID(), name: 'マイタスク', createdAt: Date.now() }];
  }
  try { todos = JSON.parse(localStorage.getItem('todo-app-todos') || '[]'); } catch { todos = []; }
  try { trash = JSON.parse(localStorage.getItem('todo-app-trash') || '[]'); } catch { trash = []; }
  try { listTrash = JSON.parse(localStorage.getItem('todo-app-list-trash') || '[]'); } catch { listTrash = []; }
  const defId = lists[0].id;
  todos = todos.map(t => t.listId ? t : { ...t, listId: defId });
  trash = trash.map(t => t.listId ? t : { ...t, listId: defId });
  // 全データ読み込み後に選択リストを復元
  const savedListId = localStorage.getItem('todo-app-selected-list');
  selectedListId = (savedListId && lists.find(l => l.id === savedListId))
    ? savedListId : lists[0].id;
}
function save() {
  localStorage.setItem('todo-app-todos',  JSON.stringify(todos));
  localStorage.setItem('todo-app-trash',  JSON.stringify(trash));
  localStorage.setItem('todo-app-lists',  JSON.stringify(lists));
  localStorage.setItem('todo-app-list-trash', JSON.stringify(listTrash));
  localStorage.setItem('todo-app-selected-list', selectedListId);
}

// ── Helpers ────────────────────────────────────────────
const today    = () => new Date().toISOString().slice(0, 10);
const tomorrow = () => new Date(Date.now() + 86400000).toISOString().slice(0, 10);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function isMobile() {
  return window.innerWidth <= 640 ||
    ('ontouchstart' in window && window.innerWidth <= 1024);
}

function currentTodos() { return todos.filter(x => x.listId === selectedListId); }
function currentTrash() { return trash.filter(x => x.listId === selectedListId); }

function listStats(lid) {
  const t = today();
  const lst = todos.filter(x => x.listId === lid);
  const active = lst.filter(x => !x.completed);
  return {
    total:    lst.length,
    active:   active.length,
    done:     lst.length - active.length,
    overdue:  active.filter(x => x.dueDate && x.dueDate < t).length,
    dueToday: active.filter(x => x.dueDate === t).length,
    future:   active.filter(x => x.dueDate && x.dueDate > t).length,
    noDate:   active.filter(x => !x.dueDate).length,
  };
}
function filtered() {
  const lst = currentTodos();
  if (filter === 'active')    return lst.filter(x => !x.completed);
  if (filter === 'completed') return lst.filter(x =>  x.completed);
  return lst;
}

// ── SVG icons ──────────────────────────────────────────
const I = {
  app:     `<svg fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>`,
  clip:    `<svg fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>`,
  plus:    `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>`,
  trash:   `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>`,
  restore: `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/></svg>`,
  x:       `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>`,
  cal:     `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>`,
  sun:     `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m8.66-9h-1M4.34 12h-1m15.07-6.07-.71.71M6.34 17.66l-.71.71m12.73 0-.71-.71M6.34 6.34l-.71-.71M12 7a5 5 0 1 0 0 10A5 5 0 0 0 12 7z"/></svg>`,
  moon:    `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`,
  grip:    `<svg fill="currentColor" viewBox="0 0 16 16"><circle cx="5" cy="4" r="1.2"/><circle cx="5" cy="8" r="1.2"/><circle cx="5" cy="12" r="1.2"/><circle cx="11" cy="4" r="1.2"/><circle cx="11" cy="8" r="1.2"/><circle cx="11" cy="12" r="1.2"/></svg>`,
  check:   `<svg fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>`,
  download:`<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5 5 5-5M12 15V3"/></svg>`,
  upload:  `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M17 8l-5-5-5 5M12 3v12"/></svg>`,
  menu:    `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>`,
  folder:  `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>`,
  memo:    `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>`,
};

// ── Due badge HTML ─────────────────────────────────────
function dueBadge(d) {
  const t = today(), tm = tomorrow();
  const ov = d < t, td = d === t, tmr = d === tm;
  const lbl = td ? '今日' : tmr ? '明日' : d.replace(/^(\d{4})-(\d{2})-(\d{2})$/, '$2/$3');
  const cls = ov ? 'due-ov' : td ? 'due-td' : 'due-fu';
  return `<span class="due-badge ${cls}">${I.cal}${ov ? `期限切れ (${lbl})` : lbl}</span>`;
}

// ── Sidebar HTML ───────────────────────────────────────
function htmlSidebar() {
  const allItems = lists.map(lst => {
    const isSel     = lst.id === selectedListId;
    const isEditing = editingListId === lst.id;
    const s         = listStats(lst.id);
    const hasDots   = s.overdue > 0 || s.dueToday > 0 || s.future > 0 || s.noDate > 0 || s.done > 0;

    const dots = (showListStats && hasDots) ? `<div class="dot-badges sidebar-dots">
      ${s.overdue  > 0 ? `<span class="dot dot-ov">${s.overdue}</span>`   : ''}
      ${s.dueToday > 0 ? `<span class="dot dot-td">${s.dueToday}</span>` : ''}
      ${s.future   > 0 ? `<span class="dot dot-fu">${s.future}</span>`   : ''}
      ${s.noDate   > 0 ? `<span class="dot dot-nd">${s.noDate}</span>`     : ''}
      ${s.done     > 0 ? `<span class="dot dot-dn">${s.done}</span>`             : ''}
    </div>` : '';

    const nameRow = isEditing
      ? `<input id="list-rename-inp" class="list-rename-input" type="text" value="${esc(editingListName)}" autocomplete="off">`
      : `<span class="list-item-name">${esc(lst.name)}</span>
         <span class="list-count-pill${isSel ? ' sel' : ''}">${s.total}</span>
         ${lists.length > 1 ? `<div class="tip-wrap list-del-wrap">
           <button class="list-del-btn" data-a="del-list" data-id="${lst.id}">${I.trash}</button>
           <span class="tip">削除</span>
         </div>` : ''}`;

    return `<li class="list-nav-item${isSel ? ' active' : ''}" data-a="select-list" data-id="${lst.id}" draggable="${!isEditing && !('ontouchstart' in window)}">
      <div class="list-drag-handle">${I.grip}</div>
      <div class="list-content">
        <div class="list-item-row">${nameRow}</div>
        ${dots}
      </div>
    </li>`;
  });

  const needCollapse = allItems.length > LIST_COLLAPSE_LIMIT;
  // 折りたたみ時も、選択中のリストは常に表示する
  let visibleItems;
  if (!needCollapse || listExpanded) {
    visibleItems = allItems;
  } else {
    const selectedIdx = allItems.findIndex((_, i) => lists[i].id === selectedListId);
    const visible = new Set();
    for (let i = 0; i < LIST_COLLAPSE_LIMIT; i++) visible.add(i);
    if (selectedIdx >= 0) visible.add(selectedIdx);
    visibleItems = allItems.filter((_, i) => visible.has(i));
  }
  const items = visibleItems.join('');
  const hiddenCount = allItems.length - (needCollapse && !listExpanded ? visibleItems.length : allItems.length);
  const chevronSvg = `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>`;
  const expandBtn = needCollapse
    ? `<button class="list-expand-btn${listExpanded ? ' expanded' : ''}" data-a="toggle-list-expand">
        ${listExpanded ? '折りたたむ' : `他 ${allItems.length - visibleItems.length} 件を表示`}${chevronSvg}
      </button>` : '';

  const addArea = addingList
    ? `<div class="list-add-form">
        <input id="list-add-inp" class="list-add-input" type="text" placeholder="リスト名を入力..." autocomplete="off">
       </div>`
    : `<button class="list-add-btn" data-a="start-add-list">${I.plus}リストを追加</button>`;

  const ltItems = listTrash.length === 0
    ? `<li class="trash-empty sidebar-trash-empty">ゴミ箱は空です</li>`
    : listTrash.map((entry, i) => {
        const cnt = entry.todos.length;
        return `<li class="list-nav-item list-trash-item">
          <div class="list-item-row">
            <span class="list-item-name">${esc(entry.list.name)}</span>
            <span class="list-count-pill">${cnt}</span>
            <div class="list-trash-actions">
              <button class="list-del-btn restore-color" data-a="restore-list" data-idx="${i}" title="復元">${I.restore}</button>
              <button class="list-del-btn" data-a="del-list-permanent" data-idx="${i}" title="削除">${I.x}</button>
            </div>
          </div>
        </li>`;
      }).join('');

  const listTrashSection = showListTrash ? `<div class="sidebar-trash-section">
    <div class="sidebar-trash-hd">
      <span class="sidebar-trash-title">${I.trash}ゴミ箱 (${listTrash.length})</span>
      ${listTrash.length > 0 ? `<button class="empty-all empty-all-sm" data-a="empty-list-trash">すべて削除</button>` : ''}
    </div>
    <ul class="list-nav sidebar-trash-list">${ltItems}</ul>
  </div>` : '';

  const trashToggle = `<div class="sidebar-trash-toggle">
    <button class="list-add-btn${showListTrash ? ' open' : ''}" data-a="toggle-list-trash">
      ${I.trash}ゴミ箱${listTrash.length > 0 ? ` <span class="trash-cnt trash-cnt-sm">${listTrash.length}</span>` : ''}
    </button>
  </div>`;

  return `<div class="sidebar-col${sidebarOpen ? ' open' : ''}" id="sidebar-col">
    <div class="card">
      <div class="sidebar-hd"><span>リスト</span><button class="stats-toggle${showListStats ? ' active' : ''}" data-a="toggle-stats" title="${showListStats ? 'ステータス非表示' : 'ステータス表示'}">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
      </button></div>
      <ul class="list-nav">${items}</ul>
      ${expandBtn}
      <div class="list-add-area">${addArea}</div>
      <div class="io-area">
        <button class="io-btn" data-a="open-export">${I.download}エクスポート</button>
        <button class="io-btn" data-a="open-import">${I.upload}インポート</button>
      </div>
      ${trashToggle}
      ${listTrashSection}
    </div>
  </div>`;
}

// ── Main content HTML ──────────────────────────────────
function htmlMain() {
  const c = listStats(selectedListId);
  const list = filtered();
  const ct = currentTrash();
  const mobile = isMobile();
  const hasTouch = 'ontouchstart' in window;

  const fbtn = [
    { key:'all',       label:'すべて',   count:c.total,  cp:'' },
    { key:'active',    label:'未完了',   count:c.active, cp:'' },
    { key:'completed', label:'完了', count:c.done,   cp:'cp-done' },
  ].map(f => {
    const act = filter === f.key;
    const showDots = (f.key === 'all' || f.key === 'active') &&
      (c.overdue > 0 || c.dueToday > 0 || c.future > 0 || c.noDate > 0 || (f.key === 'all' && c.done > 0));
    const dots = showDots ? `<span class="dot-badges">
      ${c.overdue  > 0 ? `<span class="dot dot-ov">${c.overdue}</span>`   : ''}
      ${c.dueToday > 0 ? `<span class="dot dot-td">${c.dueToday}</span>` : ''}
      ${c.future   > 0 ? `<span class="dot dot-fu">${c.future}</span>`   : ''}
      ${c.noDate   > 0 ? `<span class="dot dot-nd">${c.noDate}</span>`     : ''}
      ${f.key==='all' && c.done > 0 ? `<span class="dot dot-dn">${c.done}</span>` : ''}
    </span>` : '';
    return `<button class="filter-btn${act?' active':''}" data-filter="${f.key}">
      <span class="filter-label">${f.label}<span class="count-pill ${f.cp}">${f.count}</span></span>
      ${dots}
    </button>`;
  }).join('');

  const items = list.length === 0
    ? `<li class="empty-msg">${filter==='all'?'🎉 タスクがありません！':'該当するタスクがありません。'}</li>`
    : list.map(t => {
        const editing = editId === t.id;
        const body = editing ? `<div class="edit-form">
          <textarea id="ei-text" class="edit-text" rows="1" autocomplete="off">${esc(editText)}</textarea>
          <textarea id="ei-detail" class="edit-detail-inp" rows="1" placeholder="詳細・メモを入力（任意）..." autocomplete="off">${esc(editDetail)}</textarea>
          <div class="edit-actions">
            ${!hasTouch ? `<div class="edit-actions-row3">
              <span class="edit-folder-label">${I.folder}フォルダ</span>
              <input id="ei-folder" class="edit-folder-inp" type="text" placeholder="フォルダパス（例: C:\\Users\\...）" value="${esc(editFolderPath)}" autocomplete="off">
              ${editFolderPath ? `<button class="edit-folder-clr" data-a="clr-folder" title="クリア">${I.x}</button>` : ''}
            </div>` : ''}
            <div class="edit-actions-row1">
              ${editDue
                ? `<div class="edit-date-wrap">
                     <label for="ei-date" class="edit-date-placeholder" style="color:var(--t2);">📅 ${editDue.replace(/^(\d{4})-(\d{2})-(\d{2})$/, '$2/$3')}</label>
                     <input id="ei-date" class="edit-date" type="date" value="${esc(editDue)}">
                   </div>
                   <button class="edit-clr" data-a="clr-date">クリア</button>`
                : `<div class="edit-date-wrap">
                     <label for="ei-date" class="edit-date-placeholder">📅 期限日を設定</label>
                     <input id="ei-date" class="edit-date" type="date" value="">
                   </div>`
              }
            </div>
            <div class="edit-actions-row2">
              <button class="edit-cancel" data-a="cancel">キャンセル</button>
              <button class="edit-save" data-a="save">保存</button>
            </div>
          </div>
        </div>` : `<span class="todo-text${t.completed?' done':''}">${esc(t.text).replace(/\n/g,'<br>')}</span>`;

        const badge = (t.dueDate && !t.completed && !editing)
          ? `<div class="due-wrap">${dueBadge(t.dueDate)}</div>` : '';

        return `<li class="todo-item" data-id="${t.id}" draggable="${!editing && !hasTouch}">
          <div class="drag-handle" data-a="drag-handle" data-id="${t.id}">${I.grip}</div>
          <div class="cb-wrap"><div class="cb${t.completed?' checked':''}" data-a="toggle" data-id="${t.id}">${t.completed?I.check:''}</div></div>
          <div class="text-wrap" data-a="edit" data-id="${t.id}">${body}</div>
          ${t.detail && !editing ? `<div class="item-memo"><button data-a="memo-show" data-id="${t.id}"${memoPopupId === t.id ? ' class="active"' : ''}>${I.memo}</button></div>` : ''}
          ${!hasTouch && t.folderPath && !editing ? `<div class="item-folder"><button data-a="folder-open" data-id="${t.id}" title="${esc(t.folderPath)}">${I.folder}</button></div>` : ''}
          ${badge}
          <div class="item-del"><button data-a="to-trash" data-id="${t.id}">${I.trash}</button></div>
        </li>`;
      }).join('');

  const titems = ct.length === 0
    ? `<li class="trash-empty">ゴミ箱は空です</li>`
    : ct.map(t => `<li class="trash-item" data-id="${t.id}" draggable="${!hasTouch}">
        <span class="trash-item-text${t.completed?' was-done':''}">${esc(t.text).replace(/\n/g,'<br>')}</span>
        <div class="trash-actions">
          <button class="restore-btn" data-a="restore" data-id="${t.id}">${I.restore}復元</button>
          <div class="tip-wrap">
            <button class="del-btn" data-a="del-trash" data-id="${t.id}">${I.x}</button>
            <span class="tip">削除</span>
          </div>
        </div>
      </li>`).join('');

  const trashPanel = showTrash ? `<div class="trash-panel" id="trash-panel">
    <div class="trash-header">
      <span class="trash-title">${I.trash}ゴミ箱 (${ct.length})</span>
      ${ct.length > 0 ? `<button class="empty-all" data-a="empty">すべて削除</button>` : ''}
    </div>
    <ul class="trash-list">${titems}</ul>
  </div>` : '';

  const selList = lists.find(l => l.id === selectedListId) || lists[0];
  const listName = selList ? esc(selList.name) : '';

  return `<div class="main-col">
    <div class="card">
      <div class="list-card-hd">
        <div class="list-card-icon">${I.clip}</div>
        <span class="list-card-name">${listName}</span>
      </div>
      <div class="input-section">
        <form class="input-row" data-a="add">
          <textarea id="todo-inp" class="todo-input" rows="1" placeholder="新しいタスクを入力..." autocomplete="off"></textarea>
          <button type="submit" class="add-btn">追加</button>
        </form>
      </div>
      <div class="filters-section"><div class="filters" id="filters">${fbtn}</div></div>
      <ul class="todo-list" id="todo-list">${items}</ul>
      <div class="footer">
        <span class="remaining">残り <strong>${c.active}</strong> 件</span>
        <button class="trash-btn${showTrash?' open':''}" id="trash-btn" data-a="toggle-trash">
          ${I.trash}ゴミ箱
          ${ct.length > 0 ? `<span class="trash-cnt">${ct.length}</span>` : ''}
        </button>
      </div>
    </div>
    ${trashPanel}
  </div>`;
}

// ── Modal HTML ────────────────────────────────────────
function htmlModal() {
  if (!modalMode) return '';
  const isExport = modalMode === 'export';
  const title = isExport ? 'エクスポート' : 'インポート';
  const actionLabel = isExport ? 'エクスポート' : 'インポート';
  const selectedCount = modalLists.filter(l => l.checked).length;
  const checkSvg = I.check;

  const allRow = `<div class="modal-check-row select-all" data-a="modal-toggle-all">
    <div class="modal-cb${modalAllChecked ? ' checked' : ''}">${checkSvg}</div>
    <span class="modal-list-name">すべて選択</span>
  </div>`;

  const rows = modalLists.map(l => {
    const cnt = isExport
      ? todos.filter(t => t.listId === l.id).length
      : (l.todoCount || 0);
    return `<div class="modal-check-row" data-a="modal-toggle" data-id="${l.id}">
      <div class="modal-cb${l.checked ? ' checked' : ''}">${checkSvg}</div>
      <span class="modal-list-name">${esc(l.name)}</span>

}

function htmlMovePopup() {
  if (!movePopupTodoId) return '';
  const t = todos.find(x => x.id === movePopupTodoId);

  const arrowSvg = `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>`;
  const items = otherLists.map(l => {
    const s = listStats(l.id);
    return `<li class="move-popup-item" data-a="move-to-list" data-list-id="${l.id}" data-todo-id="${t.id}">
      <span class="move-popup-item-icon">${arrowSvg}</span>
      <span class="move-popup-item-name">${esc(l.name)}</span>
      <span class="move-popup-item-count">${s.total}件</span>

  return `<div class="move-popup-overlay" data-a="close-move-popup">

// ── Render ─────────────────────────────────────────────
function render() {
  const sy = window.scrollY;
  document.getElementById('app').innerHTML = html();
  window.scrollTo(0, sy);
  if (editId && !skipFocusRestore) {
    const inp = document.getElementById('ei-text');
    if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
  }
  skipFocusRestore = false;
  if (editingListId) {
    const inp = document.getElementById('list-rename-inp');
    if (inp) { inp.focus(); inp.select(); }
  }
  if (addingList) {
    const inp = document.getElementById('list-add-inp');
    if (inp) inp.focus();
  }
}

// ── Todo Actions ───────────────────────────────────────
function toggleDark() {
  const d = document.documentElement.classList.toggle('dark');
  localStorage.setItem('darkMode', String(d));
  render();
}
function addTodo(form) {
  const inp = form ? form.querySelector('textarea.todo-input')
            : (document.getElementById('todo-inp') || document.getElementById('todo-inp-mobile'));
  const text = inp?.value.trim();
  if (!text) return;
  todos.push({ id: crypto.randomUUID(), text, completed: false, createdAt: Date.now(), listId: selectedListId });
  save(); render();
  (document.getElementById('todo-inp') || document.getElementById('todo-inp-mobile'))?.focus();
}
function toggleTodo(id) {
  const t = todos.find(x => x.id === id);
  if (!t) return;
  t.completed = !t.completed;
  save(); render();
  if (t.completed) {
    // render後にアニメーションクラスを付与
    requestAnimationFrame(() => {
      const cb = document.querySelector(`.cb[data-id="${id}"]`);
      if (cb) cb.classList.add('animate');
      const txt = document.querySelector(`.todo-item[data-id="${id}"] .todo-text`);
      if (txt) txt.classList.add('animate');
    });
  }
}
function startEdit(id) {
  const t = todos.find(x => x.id === id);
  if (!t || t.completed) return;
  editId = id; editText = t.text; editDue = t.dueDate || ''; editFolderPath = t.folderPath || ''; editDetail = t.detail || '';
  memoPopupId = null;
  render();
}
function commitEdit() {
  const text = editText.trim();
  if (text && editId) {
    const t = todos.find(x => x.id === editId);
    if (t) { t.text = text; t.dueDate = editDue || undefined; t.folderPath = editFolderPath.trim() || undefined; t.detail = editDetail.trim() || undefined; }
    save();
  }
  editId = null; editText = ''; editDue = ''; editFolderPath = ''; editDetail = ''; render();
}
function cancelEdit() { editId = null; editText = ''; editDue = ''; editFolderPath = ''; editDetail = ''; render(); }
function moveToTrash(id) {
  const i = todos.findIndex(x => x.id === id);
  if (i < 0) return;
  trash.unshift(todos.splice(i, 1)[0]);
  save(); render();
}
function restoreFromTrash(id, asCompleted) {
  const i = trash.findIndex(x => x.id === id);
  if (i < 0) return;
  const item = trash.splice(i, 1)[0];
  if (asCompleted !== undefined) item.completed = asCompleted;
  todos.push(item); save(); render();
}
function deleteFromTrash(id) { trash = trash.filter(x => x.id !== id); save(); render(); }
function emptyTrash()        { trash = trash.filter(x => x.listId !== selectedListId); save(); render(); }
function setFilter(f)        { if (f && filter !== f) { filter = f; render(); } }
function toggleTrash() {
  showTrash = !showTrash;
  render();
  if (showTrash) {
    // 開いたときゴミ箱パネルまで自動スクロール
    requestAnimationFrame(() => {
      const panel = document.getElementById('trash-panel');
      if (panel) panel.scrollIntoView({ behavior:'smooth', block:'nearest' });
    });
  }
}
function reorder(fromId, toId) {
  const from = todos.findIndex(x => x.id === fromId);
  const to   = todos.findIndex(x => x.id === toId);
  if (from < 0 || to < 0) return;
  todos.splice(to, 0, todos.splice(from, 1)[0]);
  save(); render();
}
function reorderList(fromId, toId) {
  const from = lists.findIndex(x => x.id === fromId);
  const to   = lists.findIndex(x => x.id === toId);
  if (from < 0 || to < 0) return;
  lists.splice(to, 0, lists.splice(from, 1)[0]);
  save(); render();
}

// ── List Actions ───────────────────────────────────────
function selectList(id) {
  if (selectedListId === id) return;
  selectedListId = id;
  filter = 'all'; showTrash = false; editId = null;
  if (isMobile()) sidebarOpen = false; // モバイルではリスト選択後サイドバーを閉じる
  render();
}
function startRenameList(id) {
  const lst = lists.find(l => l.id === id);
  if (!lst) return;
  editingListId = id; editingListName = lst.name;
  render();
}
function commitRenameList() {
  if (!editingListId) return;
  const name = editingListName.trim();
  if (name) {
    const lst = lists.find(l => l.id === editingListId);
    if (lst) { lst.name = name; save(); }
  }
  editingListId = null; render();
}
function commitAddList() {
  if (!addingList) return;
  const name = newListName.trim();
  addingList = false; newListName = '';
  if (name) {
    const newList = { id: crypto.randomUUID(), name, createdAt: Date.now() };
    lists.push(newList);
    selectedListId = newList.id;
    filter = 'all'; showTrash = false;
    if (isMobile()) sidebarOpen = false;
    save();
  }
  render();
}
function handleDeleteList(id) {
  if (lists.length <= 1) return;
  const lst = lists.find(l => l.id === id);
  if (!lst) return;
  listTrash.unshift({
    list: lst,
    todos: todos.filter(t => t.listId === id),
    trash: trash.filter(t => t.listId === id),
    deletedAt: Date.now(),
  });
  lists = lists.filter(l => l.id !== id);
  todos = todos.filter(t => t.listId !== id);
  trash = trash.filter(t => t.listId !== id);
  if (selectedListId === id) { selectedListId = lists[0].id; filter = 'all'; showTrash = false; }
  save(); render();
}
function restoreList(index) {
  const entry = listTrash[index];
  if (!entry) return;
  listTrash.splice(index, 1);
  lists.push(entry.list);
  todos.push(...entry.todos);
  trash.push(...entry.trash);
  selectedListId = entry.list.id; filter = 'all'; showTrash = false;
  save(); render();
}
function deleteListPermanently(index) {
  listTrash.splice(index, 1);
  save(); render();
}
function emptyListTrash() { listTrash = []; save(); render(); }
function toggleListTrash() { showListTrash = !showListTrash; render(); }
function toggleListStats() { showListStats = !showListStats; localStorage.setItem('todo-app-show-stats', showListStats); render(); }
function toggleListExpand() { listExpanded = !listExpanded; render(); }

// ── Toast notification ────────────────────────────────
function showToast(msg) {

  if (existing) existing.remove();
  const el = document.createElement('div');
  el.id = 'app-toast'; el.className = 'toast'; el.textContent = msg;

// ── Move-to-list popup ───────────────────────────────
let movePopupOpenedAt = 0;
function showMovePopup(todoId) { movePopupTodoId = todoId; movePopupOpenedAt = Date.now(); render(); }
function closeMovePopup() { if (Date.now() - movePopupOpenedAt < 400) return; movePopupTodoId = null; render(); }
function moveToList(todoId, listId) {
